# Release Workflow
#
# Builds a statically-linked Linux binary and publishes it as a GitHub Release.
#
# Triggers:
#   - Automatically on tag push matching 'v*' (e.g., v1.0.0)
#   - Manually via workflow_dispatch (requires tag input)
#
# Outputs:
#   - GitHub Release with the tip-router-operator-cli binary and its SHA256SUMS file
name: Release

on:
  # Trigger on version tags (e.g., git push origin v1.0.0)
  push:
    tags: ["v*"]
  # Manual trigger
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0)"
        required: true
      binary:
        description: "Binary to release"
        required: true
        type: choice
        options:
          - tip-router-operator-cli
          - gcp_uploader

env:
  CARGO_TERM_COLOR: always
  TARGET: x86_64-unknown-linux-musl

# Prevent concurrent releases for the same ref
concurrency:
  group: release-${{ inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  # Run CI checks before building release
  ci:
    uses: ./.github/workflows/ci.yaml

  build:
    name: Build Release Binaries
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      # Extract version from tag push or manual input
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${{ inputs.tag }}"
          fi

          # Validate tag format
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Invalid tag format '$VERSION'. Must match 'vX.Y.Z' (e.g., v1.0.0)"
            exit 1
          fi

          # For manual triggers, verify the tag exists
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if ! git rev-parse "refs/tags/$VERSION" >/dev/null 2>&1; then
              echo "::error::Tag '$VERSION' does not exist. Push the tag first: git tag $VERSION && git push origin $VERSION"
              exit 1
            fi
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.89.0"
          target: ${{ env.TARGET }}

      # musl-tools required for static linking
      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Determine binary
        id: binary
        run: |
          BINARY="${{ inputs.binary || 'tip-router-operator-cli' }}"
          echo "name=$BINARY" >> $GITHUB_OUTPUT

      - name: Build release binary
        run: |
          cargo build --release --target ${{ env.TARGET }} \
            --package ${{ steps.binary.outputs.name }}

      # Prepare release artifacts
      - name: Prepare artifacts
        run: |
          BINARY="${{ steps.binary.outputs.name }}"
          mkdir -p release
          cp target/${{ env.TARGET }}/release/$BINARY release/
          cd release
          sha256sum $BINARY > SHA256SUMS.$BINARY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }} (${{ steps.binary.outputs.name }})
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/${{ steps.binary.outputs.name }}
            release/SHA256SUMS.${{ steps.binary.outputs.name }}
